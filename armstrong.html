<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Armstrong Number Checker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
      background: #f4f4f9;
    }
    h1 {
      color: #333;
    }
    input {
      padding: 10px;
      font-size: 16px;
      margin: 10px;
      width: 200px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      background: #0078d7;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    button:hover {
      background: #005fa3;
    }
    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      color: #444;
    }
  </style>
</head>
<body>
  <h1>Armstrong Number Checker</h1>
  <input type="number" id="numberInput" placeholder="Enter a number" />
  <button onclick="checkArmstrong()">Check</button>
  <div id="result"></div>

  <script>
    function checkArmstrong() {
      let num = document.getElementById("numberInput").value;
      let sum = 0;
      let temp = num;
      let digits = num.length;

      for (let i = 0; i < digits; i++) {
        sum += Math.pow(parseInt(num[i]), digits);
      }

      let resultDiv = document.getElementById("result");
      if (sum == temp) {
        resultDiv.innerHTML = num + " is an Armstrong number ✅";
        resultDiv.style.color = "green";
      } else {
        resultDiv.innerHTML = num + " is NOT an Armstrong number ❌";
        resultDiv.style.color = "red";
      }
    }
  </script>
</body>
</html>
