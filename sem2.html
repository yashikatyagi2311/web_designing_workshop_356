<!DOCTYPE html>                                
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Example Page</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container text-center mt-5">
    <!-- Heading -->
    <h1 class="display-4 text-primary">Welcome to My Page</h1>
    
    <!-- Paragraph -->
    <p class="lead text-secondary">
      This is a simple webpage created using Bootstrap. It demonstrates responsive design with a heading, a paragraph, and a button.
    </p>
    
    <!-- Responsive Button -->
    <button class="btn btn-success btn-lg">Click Me</button>
  </div>

  <!-- Bootstrap JS (optional for interactive components) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
