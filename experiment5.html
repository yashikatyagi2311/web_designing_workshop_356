<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Records</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f4f4f9;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .container {
      max-width: 800px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    input, button, select {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      background: #007bff;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #0056b3;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }
    th {
      background: #007bff;
      color: white;
    }
    .result {
      margin-top: 20px;
      padding: 15px;
      background: #e9ecef;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Employee Records</h1>

    <!-- Input Form -->
    <label>Employee Name:</label>
    <input type="text" id="name" placeholder="Enter name">

    <label>Department:</label>
    <input type="text" id="department" placeholder="Enter department">

    <label>Salary:</label>
    <input type="number" id="salary" placeholder="Enter salary">

    <button onclick="addEmployee()">Add Employee</button>

    <!-- Filter -->
    <label>Filter by Department:</label>
    <input type="text" id="filterDept" placeholder="e.g. HR">
    <button onclick="filterEmployees()">Filter</button>

    <!-- Display Table -->
    <table id="employeeTable">
      <thead>
        <tr>
          <th>Name</th>
          <th>Department</th>
          <th>Salary</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <!-- Calculation Result -->
